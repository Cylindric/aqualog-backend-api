[project]
name = "aqualog-api"
version = "0.0.0"
requires-python = ">=3.10,<4"

dependencies = [
    "authlib==1.3.1",
    "fastapi==0.116.1",
    "httpx==0.28.1",
    "pydantic-settings==2.10.1",
    "uvicorn==0.35.0"
]

[project.optional-dependencies]
dev = [
    "commitizen==4.16.4",
    "pytest-cov==7.1.0",
    "pytest-html==4.1.1",
    "pytest==8.4.1"
]

[tool.setuptools]
py-modules = []

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "$version"
version_scheme = "pep440"
version_provider = "pep621"
update_changelog_on_bump = true
major_version_zero = true
