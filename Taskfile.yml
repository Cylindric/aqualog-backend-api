version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  init:
    desc: Initialize the environment
    silent: true
    cmds:
      - cmd: uv sync --dev
      - cmd: |
          if [ ! -f .env ]; then
            echo "Creating .env file with default values..."
            cp .env.example .env
            echo "PG_PASS=$(openssl rand -base64 36 | tr -d '\n')" >> .env
            echo "AUTHENTIK_SECRET_KEY=$(openssl rand -base64 60 | tr -d '\n')" >> .env
          fi
      - cmd: mkdir -p .data/authentik/data
      - cmd: mkdir -p .data/authentik/certs
      - cmd: mkdir -p .data/authentik/custom-templates

  build:
    desc: Build the project
    cmds:
      - cmd: docker build -t aqualog-backend-api:latest .

  up:
    desc: Build and start the API service with docker-compose
    interactive: true
    silent: true
    cmds:
      - cmd: docker compose up --build -d

  down:
    desc: Stop docker-compose services for this project
    cmds:
      - cmd: docker compose down

  server:
    desc: Start the API server locally
    env:
      AQUALOG_APP_ENV: dev
    cmds:
      - task: test
      - task: coverage
      - cmd: uvicorn aqualog_api.app:create_app --factory --host 0.0.0.0 --port 8000

  test:
    desc: Run the test suite with coverage summary and HTML test report
    env:
      AQUALOG_APP_ENV: test
    cmds:
      - mkdir -p artifacts/tests
      - .venv/bin/pytest -q --cov=aqualog_api --cov-report=term-missing --html=artifacts/tests/index.html

  coverage:
    desc: Run tests with coverage outputs and HTML test report
    env:
      AQUALOG_APP_ENV: test
    cmds:
      - mkdir -p artifacts/coverage
      - .venv/bin/pytest -q --cov=aqualog_api --cov-report=term-missing --cov-report=html:artifacts/coverage --cov-report=xml --html=artifacts/tests/index.html

  clean:
    desc: Clean up build artifacts and temporary files
    cmds:
      - cmd: docker compose down --volumes --remove-orphans
      - cmd: rm -rf .data
      - cmd: rm -rf artifacts
    
  clean-all:
    desc: Clean up all build artifacts, temporary files, and Docker images
    cmds:
      - task: clean
      - cmd: docker rmi aqualog-backend-api:latest --force
      - cmd: rm -rf .env
      - cmd: rm -rf .venv
