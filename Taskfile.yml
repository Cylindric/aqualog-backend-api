version: '3'

vars:
  ContainerName: aqualog-backend
  Version:
    sh: poetry run cz version --project
  MajorVersion:
    sh: poetry run cz version --project --major

dotenv:
  - ../.env

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  setup:
    desc: Set up the project environment
    cmds:
      - cmd: ./tools/setup.sh

  build:
    desc: Build the project
    cmds:
      - cmd: poetry lock
      - cmd: docker build -t {{.ContainerName}}:latest .
      - cmd: docker image tag {{.ContainerName}}:latest {{.ContainerName}}:{{.Version}}

  publish:
    desc: Publish the docker image to the registry
    cmds:
      - cmd: docker push {{.ContainerName}}:{{.Version}}
      - cmd: docker push {{.ContainerName}}:latest

  scan:
    desc: Run Trivy scan for vulnerabilities
    cmds:
      - cmd: |
          docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v /var/cache/trivy:/tmp \
          -v ./.data/trivy:/data \
          aquasec/trivy image \
          --no-progress \
          --format json --output /data/scan-{{.Version}}.json \
          --scanners vuln,secret \
          --image-config-scanners misconfig,secret \
          --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
          --cache-dir /tmp/trivy \
          {{.ContainerName}}:{{.Version}}
      - cmd: |
          docker run --rm \
          -v ./.data/trivy:/data \
          aquasec/trivy convert \
          --severity MEDIUM,HIGH,CRITICAL \
          --format table --output /data/scan-{{.Version}}.txt \
          /data/scan-{{.Version}}.json

  up:
    desc: Build and start the API service with docker-compose
    interactive: true
    silent: true
    cmds:
      - cmd: mkdir -p ./.data/pgadmin4
      - cmd: sudo chown -R 5050:5050 ./.data/pgadmin4
      - cmd: docker compose up

  down:
    desc: Stop docker-compose services for this project
    cmds:
      - cmd: docker compose down

  server:
    desc: Start the API server locally
    cmds:
      # - task: test
      # - task: coverage
      # - cmd: env | grep AQUALOG
      - cmd: poetry lock
      - cmd: poetry sync
      - task: db-migrate
      - cmd: poetry run uvicorn aqualog_api.app:create_app --reload --factory --host 0.0.0.0 --port 8001

  db-migrate:
    desc: Run pending database migrations
    cmds:
      - cmd: poetry run alembic upgrade head

  db-migration-new:
    desc: Create a new migration (name via NAME var)
    cmds:
      - cmd: poetry run alembic revision --autogenerate -m "{{.NAME}}"

  auth-check:
    desc: Validate Authentik token issuance and API authentication without inline secrets
    dir: ./tools/spa
    cmds:
      - cmd: ./provider-aqualog-spa-dev.sh

  test:
    desc: Run the test suite with coverage summary and HTML test report
    env:
      AQUALOG_APP_ENV: test
    cmds:
      - mkdir -p artifacts/tests
      - .venv/bin/pytest -q --cov=aqualog_api --cov-report=term-missing --html=artifacts/tests/index.html

  coverage:
    desc: Run tests with coverage outputs and HTML test report
    env:
      AQUALOG_APP_ENV: test
    cmds:
      - mkdir -p artifacts/coverage
      - .venv/bin/pytest -q --cov=aqualog_api --cov-report=term-missing --cov-report=html:artifacts/coverage --cov-report=xml --html=artifacts/tests/index.html

  clean:
    desc: Clean up build artifacts and temporary files
    cmds:
      - cmd: docker compose down --volumes --remove-orphans
      - cmd: rm -rf .data
      - cmd: rm -rf artifacts
    
  clean-all:
    desc: Clean up all build artifacts, temporary files, and Docker images
    cmds:
      - task: clean
      - cmd: docker rmi {{.ContainerName}}:{{.Version}} --force
      - cmd: rm -rf .env
      - cmd: rm -rf .venv

  bash:
    desc: Open a bash shell in the backend container
    cmds:
      - cmd: docker run --network=backend_default --env-file .env --rm -it {{.ContainerName}}:{{.Version}} bash

  run:
    desc: Run the backend container
    cmds:
      - cmd: docker run --network=backend_default --env-file .env --rm -it {{.ContainerName}}:{{.Version}}
