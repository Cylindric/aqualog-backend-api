version: '3'

vars:
  ContainerName: aqualog-backend
  Version:
    sh: poetry run cz version --project
  MajorVersion:
    sh: poetry run cz version --project --major

dotenv:
  - .env

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  setup:
    desc: Set up the project environment
    cmds:
      - cmd: ./tools/setup.sh

  build:
    desc: Build the project
    cmds:
      - cmd: poetry lock
      - cmd: docker build -t {{.ContainerName}}:{{.Version}} .

  scan:
    desc: Run Trivy scan for vulnerabilities
    cmds:
      - cmd: |
          docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v /var/cache/trivy:/tmp \
          -v ./.data/trivy:/data \
          aquasec/trivy image \
          --no-progress \
          --format json --output /data/scan-{{.Version}}.json \
          --scanners vuln,secret \
          --image-config-scanners misconfig,secret \
          --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
          --cache-dir /tmp/trivy \
          {{.ContainerName}}:{{.Version}}
      - cmd: |
          docker run --rm \
          -v ./.data/trivy:/data \
          aquasec/trivy convert \
          --severity MEDIUM,HIGH,CRITICAL \
          --format table --output /data/scan-{{.Version}}.txt \
          /data/scan-{{.Version}}.json

  up:
    desc: Build and start the API service with docker-compose
    interactive: true
    silent: true
    cmds:
      - cmd: docker compose up

  down:
    desc: Stop docker-compose services for this project
    cmds:
      - cmd: docker compose down

  server:
    desc: Start the API server locally
    env:
      AQUALOG_APP_ENV: "{{.AQUALOG_APP_ENV | default \"dev\"}}"
      AQUALOG_OAUTH_ISSUER_URL: "{{.AQUALOG_OAUTH_ISSUER_URL | default \"https://auth.aqualog.home.cylindric.net/application/o/aqualog-spa/\"}}"
      AQUALOG_OAUTH_AUDIENCE: "{{.AQUALOG_OAUTH_AUDIENCE | default \"nnW24FDNL6aQUDU4o8DMKvFaWn1hd2XzLx0M83NR\"}}"
      REQUESTS_CA_BUNDLE: "{{.REQUESTS_CA_BUNDLE | default \"/etc/ssl/certs/ca-certificates.crt\"}}"
      SSL_CERT_FILE: "{{.SSL_CERT_FILE | default \"/etc/ssl/certs/ca-certificates.crt\"}}"
      CURL_CA_BUNDLE: "{{.CURL_CA_BUNDLE | default \"/etc/ssl/certs/ca-certificates.crt\"}}"

    cmds:
      # - task: test
      # - task: coverage
      - cmd: poetry run uvicorn aqualog_api.app:create_app --reload --factory --host 0.0.0.0 --port 9000

  auth-check:
    desc: Validate Authentik token issuance and API authentication without inline secrets
    env:
      ISSUER: "{{.AQUALOG_OAUTH_ISSUER_URL}}"
      TOKEN_ENDPOINT: "https://auth.aqualog.home.cylindric.net/application/o/token/"
      API_URL: "http://localhost:8000/api/v1/calculate/dose/salinity?volume=100&current=30&target=35"
      REQUESTS_CA_BUNDLE: "/etc/ssl/certs/ca-certificates.crt"
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
    dir: ./useful_tools
    cmds:
      - cmd: ./test.sh

  test:
    desc: Run the test suite with coverage summary and HTML test report
    env:
      AQUALOG_APP_ENV: test
    cmds:
      - mkdir -p artifacts/tests
      - .venv/bin/pytest -q --cov=aqualog_api --cov-report=term-missing --html=artifacts/tests/index.html

  coverage:
    desc: Run tests with coverage outputs and HTML test report
    env:
      AQUALOG_APP_ENV: test
    cmds:
      - mkdir -p artifacts/coverage
      - .venv/bin/pytest -q --cov=aqualog_api --cov-report=term-missing --cov-report=html:artifacts/coverage --cov-report=xml --html=artifacts/tests/index.html

  clean:
    desc: Clean up build artifacts and temporary files
    cmds:
      - cmd: docker compose down --volumes --remove-orphans
      - cmd: rm -rf .data
      - cmd: rm -rf artifacts
    
  clean-all:
    desc: Clean up all build artifacts, temporary files, and Docker images
    cmds:
      - task: clean
      - cmd: docker rmi {{.ContainerName}}:{{.Version}} --force
      - cmd: rm -rf .env
      - cmd: rm -rf .venv
